<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Premium Calculator T2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f0a500;
            --bg: #0f111a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            background: radial-gradient(circle at top right, #1a1f35, #0f111a);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Buton plutitor pentru Unblur */
        .toggle-blur-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: #0f111a;
            border: none;
            padding: 12px 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(240, 165, 0, 0.3);
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .toggle-blur-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(240, 165, 0, 0.5);
        }

        /* Stilurile pentru efectul de blur */
        .sensitive-amount {
            filter: blur(6px);
            transition: filter 0.3s ease;
            user-select: none;
            display: inline-block;
        }

        body.show-values .sensitive-amount {
            filter: blur(0px) !important;
            user-select: auto;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 2.8em;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            opacity: 0.6;
            margin-bottom: 50px;
            font-weight: 300;
        }

        .model-section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            margin-bottom: 40px;
            padding: 30px;
            transition: transform 0.3s ease;
        }

        .model-section:hover {
            transform: translateY(-5px);
            border-color: rgba(240, 165, 0, 0.3);
        }

        h2 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--primary);
            font-size: 1.5em;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            height: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            font-size: 0.9em;
        }

        th {
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75em;
            opacity: 0.5;
            padding: 10px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border: none; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dotted var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            display: block;
            font-size: 0.8em;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: 600;
            color: #fff;
        }

        .summary-dashboard {
            background: linear-gradient(145deg, #1e2235, #0f111a);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 40px;
            margin-top: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .big-stat {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .highlight-yellow {
            color: var(--primary);
            font-size: 1.8em;
            font-weight: 800;
            display: block;
        }

        .total-comision-box {
            grid-column: 1 / -1;
            background: rgba(240, 165, 0, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px dashed var(--primary);
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .toggle-blur-btn { position: static; display: block; width: 100%; margin-bottom: 20px; text-align: center; border-radius: 12px; }
        }
    </style>
</head>
<body>

<button class="toggle-blur-btn" onclick="toggleBlur()">Afișează/Ascunde Sumele 👁️</button>

<div class="container">
    <h1>Calculator Venit NET</h1>
    <p class="subtitle">Sistem inteligent de procesare plăți • T2 2026</p>

    <div id="models-container"></div>

    <div class="summary-dashboard">
        <h2 style="margin-bottom: 40px;">📊 Dashboard Rezumat</h2>
        <div class="summary-grid">
            <div class="big-stat">
                <span class="stat-label">TOTAL NET GENERAL</span>
                <span id="totalNetAll" class="highlight-yellow sensitive-amount">0.00</span>
            </div>
            <div class="big-stat">
                <span class="stat-label">TOTAL NET IVY</span>
                <span id="totalNetIvyOnly" class="highlight-yellow sensitive-amount">0.00</span>
            </div>
            <div class="big-stat">
                <span class="stat-label">COMISION 20%</span>
                <span id="sumTotal20" class="stat-value sensitive-amount">0.00</span>
            </div>
            <div class="big-stat">
                <span class="stat-label">COMISION 22.5%</span>
                <span id="sumTotal225" class="stat-value sensitive-amount">0.00</span>
            </div>
            <div class="total-comision-box">
                <span class="stat-label">TOTAL COMISION DE ÎNCASAT</span>
                <div>
                    <span id="totalComisionAll" class="sensitive-amount" style="font-size: 3em; font-weight: 900; color: #fff;">0.00</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Obiectul de configurare menține acum ordinea specifică: ElisaVibe este pus direct sub BustyMama
    const modelsConfig = {
        'BustyMama': 0.20,
        'ElisaVibe': 0.20,
        'EmmaRiley': 0.20,
        'EmaR': 0.20,
        'EmaR69': 0.20,
        'IvyVIP': 0.225,
        'IvyLovell': 0.225,
        'IvyLovell69': 0.225
    };

    const models = Object.keys(modelsConfig);
    const container = document.getElementById('models-container');

    // Generăm automat secțiunile pentru a păstra codul curat
    models.forEach(model => {
        const perc = (modelsConfig[model] * 100).toFixed(1);
        const section = document.createElement('div');
        section.className = 'model-section';
        section.innerHTML = `
            <h2><span>💗</span> ${model} <small style="font-size: 0.5em; opacity: 0.5;">(${perc}%)</small></h2>
            <textarea id="input${model}" placeholder="Inserează datele pentru ${model} aici..." oninput="processData('${model}')"></textarea>
            <table id="resultsTable${model}">
                <thead>
                    <tr>
                        <th>Dată</th>
                        <th>Brut</th>
                        <th>Comision</th>
                        <th>Net</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">TOTAL NET</span>
                    <span id="totalNet${model}" class="stat-value sensitive-amount">0.00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">COMISION (${perc}%)</span>
                    <span id="totalPercent${model}" class="stat-value sensitive-amount" style="color: var(--primary);">0.00</span>
                </div>
            </div>
        `;
        container.appendChild(section);
    });

    // Funcția care face switch-ul între blur și vizibil
    function toggleBlur() {
        document.body.classList.toggle('show-values');
    }

    function processData(model) {
        const input = document.getElementById(`input${model}`).value;
        const rows = input.split('\n');
        const tableBody = document.querySelector(`#resultsTable${model} tbody`);
        tableBody.innerHTML = ''; 

        let totalNet = 0;
        const percentage = modelsConfig[model];

        rows.forEach(row => {
            const columns = row.split('\t'); 
            if (columns.length >= 4) {
                const date = columns[0];
                const brut = parseFloat(columns[1].replace('$', '').trim()) || 0;
                const comision = parseFloat(columns[2].replace('$', '').trim()) || 0;
                const net = parseFloat(columns[3].replace('$', '').trim()) || 0;

                totalNet += net;

                const rowElement = document.createElement('tr');
                rowElement.innerHTML = `
                    <td>${date}</td>
                    <td>$${brut.toFixed(2)}</td>
                    <td>$${comision.toFixed(2)}</td>
                    <td style="font-weight: 600;"><span class="sensitive-amount">$${net.toFixed(2)}</span></td>
                `;
                tableBody.appendChild(rowElement);
            }
        });

        document.getElementById(`totalNet${model}`).innerText = totalNet.toFixed(2);
        document.getElementById(`totalPercent${model}`).innerText = (totalNet * percentage).toFixed(2);

        calculateTotalAllModels();
    }

    function calculateTotalAllModels() {
        let totalNetAll = 0;
        let totalNetIvyOnly = 0;
        let sumTotal20 = 0;
        let sumTotal225 = 0;

        models.forEach(model => {
            const netVal = parseFloat(document.getElementById(`totalNet${model}`).innerText) || 0;
            const percVal = parseFloat(document.getElementById(`totalPercent${model}`).innerText) || 0;
            
            totalNetAll += netVal;
            
            if (modelsConfig[model] === 0.20) {
                sumTotal20 += percVal;
            } else {
                totalNetIvyOnly += netVal;
                sumTotal225 += percVal;
            }
        });

        document.getElementById('totalNetAll').innerText = totalNetAll.toFixed(2);
        document.getElementById('totalNetIvyOnly').innerText = totalNetIvyOnly.toFixed(2);
        document.getElementById('sumTotal20').innerText = sumTotal20.toFixed(2);
        document.getElementById('sumTotal225').innerText = sumTotal225.toFixed(2);
        document.getElementById('totalComisionAll').innerText = (sumTotal20 + sumTotal225).toFixed(2);
    }
</script>

</body>
</html>
